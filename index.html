<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MEHR IS MEHR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffd1dc; /* hellrosa */
      color: #111;
    }

    h1 {
      font-size: 8vw;
      margin-top: 20px;
      color: #87cefa; /* hellblau */
    }

    img {
      width: 60%;
      max-width: 250px;
      margin: 20px auto;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    #count {
      font-size: 20vw;
      margin: 10px;
      font-weight: bold;
    }

    #message {
      font-size: 6vw;
      color: #ff1493;
      height: 40px;
    }

    #timer {
      font-size: 7vw;
      margin-top: 10px;
      color: #ff8c00;
    }

    button {
      width: 80%;
      max-width: 300px;
      font-size: 5vw;
      margin: 10px;
      padding: 15px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }

    .add { background: limegreen; color: white; }
    .reset { background: crimson; color: white; }
    .test1 { background: dodgerblue; color: white; }
    .test2 { background: purple; color: white; }
  </style>
</head>

<body>

  <h1>🍾 MEHR IS MEHR</h1>

  <img src="dein-bild.jpg" alt="Party Bild">

  <div id="count">0</div>
  <div id="timer">30:00</div>
  <div id="message"></div>

  <button class="add" onclick="add()">+1 Shot</button>
  <button class="reset" onclick="reset()">Reset</button>

  <button class="test1" onclick="testShotSound()">🔊 Shot Sound testen</button>
  <button class="test2" onclick="testAlarmSound()">🚨 Alarm Sound testen</button>

  <!-- Sounds -->
  <audio id="shotSound" src="shotSound.mp3" preload="auto"></audio>
  <audio id="alarmSound" src="alarmSound.mp3" preload="auto"></audio>

  <script>
    let count = parseInt(localStorage.getItem("riciShots") || "0", 10);
    let lastShotTime = parseInt(localStorage.getItem("lastShotTime") || Date.now(), 10);

    const shotSound = document.getElementById("shotSound");
    const alarmSound = document.getElementById("alarmSound");

    let audioUnlocked = false;
    let alarmTriggered = false;

    document.getElementById("count").innerText = count;

    // 🔓 Audio Unlock (wichtig für mobile Browser)
    function unlockAudio() {
      if (audioUnlocked) return;
      shotSound.play().then(() => {
        shotSound.pause();
        shotSound.currentTime = 0;
      }).catch(() => {});
      audioUnlocked = true;
    }

    document.body.addEventListener("click", unlockAudio, { once: true });

    function playSound(audio) {
      audio.currentTime = 0;
      audio.play().catch(e => console.log("Audio blockiert:", e));
    }

    function add() {
      unlockAudio();

      count++;
      lastShotTime = Date.now();

      playSound(shotSound);
      update();

      localStorage.setItem("riciShots", count);
      localStorage.setItem("lastShotTime", lastShotTime);
    }

    function reset() {
      count = 0;
      lastShotTime = Date.now();

      update();

      localStorage.setItem("riciShots", count);
      localStorage.setItem("lastShotTime", lastShotTime);
    }

    function update() {
      document.getElementById("count").innerText = count;

      if (count !== 0 && count % 5 === 0) {
        document.getElementById("message").innerText = "🍹 Zeit für Mojito Shot!";
      } else {
        document.getElementById("message").innerText = "";
      }
    }

    function testShotSound() {
      unlockAudio();
      playSound(shotSound);
    }

    function testAlarmSound() {
      unlockAudio();
      playSound(alarmSound);
    }

    setInterval(() => {
      let now = Date.now();
      let diff = 1800000 - (now - lastShotTime);

      if (diff < 0) diff = 0;

      let minutes = Math.floor(diff / 60000);
      let seconds = Math.floor((diff % 60000) / 1000);

      document.getElementById("timer").innerText =
        `${minutes}:${seconds.toString().padStart(2, "0")}`;

      if (diff === 0 && !alarmTriggered) {
        alarmTriggered = true;

        document.getElementById("message").innerText =
          "🚨 SHOT ALARM – Zeit für Sekt! 🍾";

        playSound(alarmSound);
      }

      if (diff > 0) {
        alarmTriggered = false;
      }

    }, 1000);
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MEHR IS MEHR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffd1dc;
      color: #111;
      transition: background 0.2s;
    }

    h1 {
      font-size: 8vw;
      margin-top: 20px;
      color: #87cefa;
    }

    img {
      width: 60%;
      max-width: 250px;
      margin: 20px auto;
      border-radius: 20px;
    }

    #count, #taskCount {
      font-size: 16vw;
      margin: 5px;
      font-weight: bold;
    }

    #timer {
      font-size: 7vw;
      margin-top: 10px;
      color: #ff8c00;
    }

    #message {
      font-size: 6vw;
      color: #ff1493;
      min-height: 40px;
    }

    button {
      width: 80%;
      max-width: 300px;
      font-size: 5vw;
      margin: 10px;
      padding: 15px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }

    .add { background: limegreen; color: white; }
    .task { background: dodgerblue; color: white; }
    .alarm { background: orange; color: white; }
    .reset { background: crimson; color: white; }

    /* 💀 CHAOS SHAKE */
    @keyframes chaosShake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-10px, 10px); }
      40% { transform: translate(10px, -10px); }
      60% { transform: translate(-10px, -10px); }
      80% { transform: translate(10px, 10px); }
      100% { transform: translate(0, 0); }
    }

    .chaos {
      animation: chaosShake 0.2s infinite;
    }
  </style>
</head>

<body>

  <h1>🍾 MEHR IS MEHR 🍾</h1>

  <img src="dein-bild.jpg" alt="Party Bild">

  <div>🍹 Shots</div>
  <div id="count">0</div>

  <div>📋 Aufgaben</div>
  <div id="taskCount">0</div>

  <div id="timer">30:00</div>
  <div id="message"></div>

  <button class="add" onclick="addShot()">+1 Shot</button>
  <button class="task" onclick="addTask()">+1 Aufgabe</button>
  <button class="alarm" onclick="toggleAlarm()">🚨 Start Alarm</button>
  <button class="reset" onclick="resetAll()">Reset</button>

  <!-- Sounds -->
  <audio id="shotSound" src="shotSound.mp3"></audio>
  <audio id="alarmSound" src="alarmSound.mp3"></audio>
  <audio id="taskSound" src="aufgabeSounde.mp3"></audio>
  <audio id="chaosSound" src="chaosSound.mp3"></audio>

  <script>
    let count = parseInt(localStorage.getItem("shots") || "0", 10);
    let taskCount = parseInt(localStorage.getItem("tasks") || "0", 10);
    let lastShotTime = parseInt(localStorage.getItem("lastShotTime") || Date.now(), 10);

    const shotSound = document.getElementById("shotSound");
    const alarmSound = document.getElementById("alarmSound");
    const taskSound = document.getElementById("taskSound");
    const chaosSound = document.getElementById("chaosSound");

    let alarmActive = false;
    let alarmTriggered = false;
    let chaosTriggered = false;
    let shotMessageTimeout = null;

    document.getElementById("count").innerText = count;
    document.getElementById("taskCount").innerText = taskCount;

    function playSound(audio) {
      audio.pause();
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function stopAlarm() {
      alarmSound.pause();
      alarmSound.currentTime = 0;
      alarmActive = false;
      alarmTriggered = false;
    }

    function chaosMode() {
      if (chaosTriggered) return;
      chaosTriggered = true;

      playSound(chaosSound);

      const msg = document.getElementById("message");
      msg.innerText = "💀 Super Rici! Du bist jetzt betrunken 💀";

      document.body.classList.add("chaos");

      let blink = 0;

      const interval = setInterval(() => {
        document.body.style.background =
          document.body.style.background === "red"
            ? "#ffd1dc"
            : "red";

        blink++;

        if (blink > 10) {
          clearInterval(interval);
          document.body.style.background = "#ffd1dc";
          document.body.classList.remove("chaos");
        }
      }, 200);
    }

    function addShot() {
      count++;
      lastShotTime = Date.now();

      stopAlarm();
      playSound(shotSound);

      update();

      localStorage.setItem("shots", count);
      localStorage.setItem("lastShotTime", lastShotTime);
    }

    function addTask() {
      taskCount++;
      localStorage.setItem("tasks", taskCount);

      update();

      if (taskCount === 11) {
        chaosMode();
        return;
      }

      playSound(taskSound);
    }

    function toggleAlarm() {
      if (alarmActive) {
        stopAlarm();
        return;
      }

      alarmActive = true;
      alarmTriggered = false;
      playSound(alarmSound);
    }

    function resetAll() {
      count = 0;
      taskCount = 0;
      lastShotTime = Date.now();

      chaosTriggered = false;
      stopAlarm();

      document.getElementById("message").innerText = "";

      update();

      localStorage.setItem("shots", count);
      localStorage.setItem("tasks", taskCount);
      localStorage.setItem("lastShotTime", lastShotTime);
    }

    function update() {
      document.getElementById("count").innerText = count;
      document.getElementById("taskCount").innerText = taskCount;

      if (taskCount === 11) {
        chaosMode();
        return;
      }

      // 🍹 Shot Message FIX
      if (count !== 0 && count % 5 === 0) {
        const msg = document.getElementById("message");

        msg.innerText = "🍹 Zeit zum Mojito Shot ins Goscherl fetzen";

        if (shotMessageTimeout) clearTimeout(shotMessageTimeout);

        shotMessageTimeout = setTimeout(() => {
          // nur löschen wenn KEIN Chaos aktiv
          if (!chaosTriggered) {
            msg.innerText = "";
          }
        }, 3000);
      }
    }

    setInterval(() => {
      let now = Date.now();
      let diff = 1800000 - (now - lastShotTime);

      if (diff < 0) diff = 0;

      let minutes = Math.floor(diff / 60000);
      let seconds = Math.floor((diff % 60000) / 1000);

      document.getElementById("timer").innerText =
        `${minutes}:${seconds.toString().padStart(2, "0")}`;

      if (diff === 0 && !alarmTriggered && alarmActive) {
        alarmTriggered = true;

        document.getElementById("message").innerText =
          "🚨 Zeit für einen Shot oder eine Aufgabe 🍾📋";

        playSound(alarmSound);
      }

      if (diff > 0) {
        alarmTriggered = false;
      }

    }, 1000);
  </script>

</body>
</html>

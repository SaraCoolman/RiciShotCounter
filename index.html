<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Ricis Sauf Counter</title>

  <!-- Wichtig für Mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #1a1a1a, #000);
      color: white;
    }

    h1 {
      font-size: 8vw;
      margin-top: 20px;
    }

    img {
      width: 60%;
      max-width: 250px;
      margin: 20px auto;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    #count {
      font-size: 20vw;
      margin: 10px;
      font-weight: bold;
    }

    #message {
      font-size: 6vw;
      color: #00ffcc;
      height: 40px;
    }

    button {
      width: 80%;
      max-width: 300px;
      font-size: 6vw;
      margin: 10px;
      padding: 15px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }

    .add {
      background: limegreen;
    }

    .reset {
      background: crimson;
    }
  </style>
</head>

<body>

  <h1>🍾 Ricis Sauf Counter</h1>

  <img src="dein-bild.jpg" alt="Party Bild">

  <div id="count">0</div>
  <div id="message"></div>

  <button class="add" onclick="add()">+1 Shot</button>
  <button class="reset" onclick="reset()">Reset</button>

  <!-- Sound -->
  <audio id="sound" src="sound.mp3"></audio>

  <script>
    let count = localStorage.getItem("riciShots") || 0;
    count = parseInt(count);
    document.getElementById("count").innerText = count;

    function add() {
      count++;
      update();

      // 🔊 Sound abspielen
      document.getElementById("sound").play();
    }

    function reset() {
      count = 0;
      update();
    }

    function update() {
      document.getElementById("count").innerText = count;
      localStorage.setItem("riciShots", count);

      // 🍹 Mojito Check
      if (count % 5 === 0 && count !== 0) {
        document.getElementById("message").innerText = "🍹 Zeit für Mojito Shot!";
      } else {
        document.getElementById("message").innerText = "";
      }
    }
  </script>

</body>
</html>

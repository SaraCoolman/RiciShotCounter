<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>MEHR IS MEHR</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #1a1a1a, #000);
      color: white;
    }

    h1 {
      font-size: 8vw;
      margin-top: 20px;
    }

    img {
      width: 60%;
      max-width: 250px;
      margin: 20px auto;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    #count {
      font-size: 20vw;
      margin: 10px;
      font-weight: bold;
    }

    #message {
      font-size: 6vw;
      color: #00ffcc;
      height: 40px;
    }

    #timer {
      font-size: 7vw;
      margin-top: 10px;
      color: orange;
    }

    button {
      width: 80%;
      max-width: 300px;
      font-size: 6vw;
      margin: 10px;
      padding: 15px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
    }

    .add { background: limegreen; }
    .reset { background: crimson; }
  </style>
</head>

<body>

  <h1>🍾 MEHR IS MEHR 🍾 </h1>

  <img src="dein-bild.jpg" alt="Party Bild">

  <div id="count">0</div>
  <div id="timer">30:00</div>
  <div id="message"></div>

  <button class="add" onclick="add()">+1 Shot</button>
  <button class="reset" onclick="reset()">Reset</button>

  <!-- Sounds -->
  <audio id="shotSound" src="sound.mp3"></audio>
  <audio id="alarmSound" src="alarm.mp3"></audio>

  <script>
    let count = localStorage.getItem("riciShots") || 0;
    count = parseInt(count);

    let lastShotTime = localStorage.getItem("lastShotTime");
    if (!lastShotTime) lastShotTime = Date.now();
    lastShotTime = parseInt(lastShotTime);

    const shotSound = document.getElementById("shotSound");
    const alarmSound = document.getElementById("alarmSound");

    document.getElementById("count").innerText = count;

    function add() {
      count++;
      lastShotTime = Date.now();

      shotSound.play();
      update();

      localStorage.setItem("riciShots", count);
      localStorage.setItem("lastShotTime", lastShotTime);
    }

    function reset() {
      count = 0;
      lastShotTime = Date.now();
      update();

      localStorage.setItem("riciShots", count);
      localStorage.setItem("lastShotTime", lastShotTime);
    }

    function update() {
      document.getElementById("count").innerText = count;

      // 🍾 alle 5 Shots
      if (count % 5 === 0 && count !== 0) {
        document.getElementById("message").innerText =
          "🍹 Zeit für Shot!";
      } else {
        document.getElementById("message").innerText = "";
      }
    }

    // ⏱️ Live Countdown + Alarm
    setInterval(() => {
      let now = Date.now();
      let diff = 1800000 - (now - lastShotTime); // 30 min

      if (diff < 0) diff = 0;

      let minutes = Math.floor(diff / 60000);
      let seconds = Math.floor((diff % 60000) / 1000);

      document.getElementById("timer").innerText =
        `${minutes}:${seconds.toString().padStart(2, "0")}`;

      // 🚨 Alarm
      if (diff === 0) {
        document.getElementById("message").innerText =
          "🚨 SHOT ALARM – Zeit für Sekt! 🍾";

        alarmSound.play();

        // reset timer damit es nicht spammt
        lastShotTime = Date.now();
        localStorage.setItem("lastShotTime", lastShotTime);
      }

    }, 1000);
  </script>

</body>
</html>
